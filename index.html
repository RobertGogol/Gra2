<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Gra Geometryczna P2P</title>
    <style>
        body { margin: 0; background: #222; font-family: sans-serif; overflow: hidden; color: white; text-align: center; }
        #setup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.5); width: 300px; z-index: 10; }
        select, input, button { margin: 10px; padding: 8px; font-size: 16px; width: 90%; box-sizing: border-box; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; cursor: not-allowed; }
        #share-link { display: none; background: #444; padding: 10px; margin-top: 10px; font-size: 12px; word-break: break-all; border: 1px dashed #666; }
        canvas { display: block; background: #111; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        #kaszanka-overlay { display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 48px; font-weight: bold; color: #ff3333; text-shadow: 2px 2px #000; pointer-events: none; z-index: 5; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
</head>
<body>

    <div id="setup">
        <h2 id="title">Tworzenie gry...</h2>
        <input type="text" id="username" placeholder="Twoje imię" maxlength="10"><br>
        <label for="shape">Wybierz figurę:</label>
        <select id="shape">
            <option value="circle">Koło</option>
            <option value="square">Kwadrat</option>
            <option value="triangle">Trójkąt</option>
            <option value="pentagon">Pięciokąt</option>
            <option value="diamond">Romb</option>
        </select><br>
        <button id="start-btn" onclick="startGame()" disabled>Czekaj na sieć...</button>
        <div id="share-link"></div>
    </div>

    <div id="kaszanka-overlay">MASZ KASZANKĘ?</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        let peer = null;
        let connections = [];
        let roomId = null;
        let isHost = false;

        let canvas, ctx;
        let localPlayer = null;
        let players = {};
        let keys = {};
        let audioCtx = null;
        let kaszankaTimer = null;

        // Inicjalizacja Canvas i Contextu natychmiast, by uniknąć pustego ekranu
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Wykrywanie pokoju z adresu URL
        const urlParams = new URLSearchParams(window.location.search);
        const urlRoomId = urlParams.get('room');

        if (urlRoomId) {
            roomId = urlRoomId;
            isHost = false;
        } else {
            roomId = 'room-' + Math.random().toString(36).substring(2, 9);
            isHost = true;
        }

        // Inicjalizacja PeerJS
        const myPeerId = isHost ? roomId : 'peer-' + Math.random().toString(36).substring(2, 9);
        
        try {
            peer = new Peer(myPeerId);

            peer.on('open', (id) => {
                document.getElementById('title').innerText = isHost ? "Stwórz nową grę" : "Dołączasz do gry";
                const btn = document.getElementById('start-btn');
                btn.innerText = "Start";
                btn.disabled = false;

                if (isHost) {
                    const shareUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
                    const linkDiv = document.getElementById('share-link');
                    linkDiv.style.display = 'block';
                    linkDiv.innerHTML = `<strong>Wyślij ten link znajomym:</strong><br><input type="text" value="${shareUrl}" readonly onclick="this.select()">`;
                }
            });

            peer.on('connection', (conn) => {
                connections.push(conn);
                setupConnectionHandlers(conn);
            });

            peer.on('error', (err) => {
                console.error('PeerJS Error:', err);
                document.getElementById('title').innerText = "Błąd połączenia z siecią";
            });
        } catch (e) {
            console.error('Błąd inicjalizacji PeerJS:', e);
        }

        function setupConnectionHandlers(conn) {
            conn.on('data', (data) => {
                if (data.type === 'update') {
                    players[data.id] = data.player;
                    if (isHost) {
                        broadcast({ type: 'sync', players: players });
                    }
                }
                if (data.type === 'sync') {
                    players = data.players;
                }
                if (data.type === 'collision_event') {
                    triggerKaszanka();
                }
            });

            conn.on('close', () => {
                connections = connections.filter(c => c !== conn);
                for (let id in players) {
                    if (!connections.some(c => c.peer === id) && id !== peer.id && id !== roomId) {
