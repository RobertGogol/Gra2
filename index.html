<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gra Geometryczna P2P</title>
    <style>
        /* Gwarantujemy, że body zajmuje cały ekran i tło jest ciemne */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #222;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            text-align: center;
        }

        /* Panel startowy musi być widoczny na środku */
        #setup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #333;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.7);
            width: 320px;
            z-index: 100; /* Bardzo wysoki priorytet wyświetlania */
            display: block; /* Upewniamy się, że jest widoczny na starcie */
        }

        h2 { margin-top: 0; color: #fff; }
        select, input, button {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid #555;
        }

        input { background: #fff; color: #000; }
        select { background: #fff; color: #000; }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) { background-color: #45a049; }
        button:disabled { background-color: #555; cursor: not-allowed; opacity: 0.7; }

        #share-link {
            display: none;
            background: #444;
            padding: 10px;
            margin-top: 15px;
            font-size: 12px;
            word-break: break-all;
            border: 1px dashed #666;
            color: #aaa;
        }

        #share-link input {
            font-size: 11px;
            padding: 5px;
            margin-top: 5px;
            background: #222;
            color: #4CAF50;
            border: 1px solid #444;
        }

        /* Canvas domyślnie jest ukryty pod spodem */
        canvas {
            display: block;
            background: #111;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Napis kolizji */
        #kaszanka-overlay {
            display: none;
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 56px;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000;
            pointer-events: none;
            z-index: 50;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="setup">
        <h2 id="title">Ładowanie sieci...</h2>
        <div id="status-msg">Łączenie z serwerem sygnalizacyjnym...</div>
        
        <div id="setup-controls" style="display:none;">
            <input type="text" id="username" placeholder="Twoje imię (max 10 znaków)" maxlength="10"><br>
            <label for="shape" style="font-size:14px; color:#ccc;">Wybierz swoją figurę:</label>
            <select id="shape">
                <option value="circle">🟢 Koło</option>
                <option value="square">🟦 Kwadrat</option>
                <option value="triangle">🔺 Trójkąt</option>
                <option value="pentagon">⬠ Pięciokąt</option>
                <option value="diamond">🔷 Romb</option>
            </select><br>
            <button id="start-btn" onclick="startGame()">Start</button>
            <div id="share-link"></div>
        </div>
    </div>

    <div id="kaszanka-overlay">MASZ KASZANKĘ?</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        // Sprawdzenie czy biblioteka PeerJS załadowała się poprawnie
        if (typeof Peer === 'undefined') {
            document.getElementById('title').innerText = "Błąd krytyczny";
            document.getElementById('status-msg').innerHTML = "<span style='color:#ff4444'>Nie udało się załadować biblioteki PeerJS.</span><br><br>Prawdopodobnie AdBlock lub Firewall blokuje skrypt.<br>Wyłącz rozszerzenia blokujące i odśwież stronę.";
            throw new Error("PeerJS client library not loaded.");
        }

        let peer = null;
        let connections = [];
        let roomId = null;
        let isHost = false;

        let canvas, ctx;
        let localPlayer = null;
        let players = {};
        let keys = {};
        let audioCtx = null;
        let kaszankaTimer = null;

        // Inicjalizacja Canvas
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (!localPlayer) drawPlaceholderBackground();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawPlaceholderBackground() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Obsługa logiki pokoju
        const urlParams = new URLSearchParams(window.location.search);
        const urlRoomId = urlParams.get('room');

        if (urlRoomId) {
            roomId = urlRoomId;
            isHost = false;
        } else {
            roomId = 'room-' + Math.random().toString(36).substring(2, 9);
            isHost = true;
        }

        // --- Konfiguracja PEERJS ---
        // Używamy darmowego publicznego serwera PeerJS
        const myPeerId = isHost ? roomId : 'peer-' + Math.random().toString(36).substring(2, 9);
        
        try {
            peer = new Peer(myPeerId, {
                debug: 1 // Pokazuje tylko błędy w konsoli
            });

            peer.on('open', (id) => {
                console.log('Połączono z siecią PeerJS. ID:', id);
                document.getElementById('title').innerText = isHost ? "Stwórz nową grę" : "Dołącz do gry";
                document.getElementById('status-msg').style.display = 'none';
                document.getElementById('setup-controls').style.display = 'block';

                if (isHost) {
                    const shareUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
                    const linkDiv = document.getElementById('share-link');
                    linkDiv.style.display = 'block';
                    linkDiv.innerHTML = `<strong>Wyślij ten link znajomemu, aby dołączył:</strong><br><input type="text" value="${shareUrl}" readonly onclick="this.select()">`;
                }
            });

            // Host nasłuchuje połączeń
            peer.on('connection', (conn) => {
                console.log('Nowe połączenie od:', conn.peer);
                connections.push(conn);
                setupConnectionHandlers(conn);
            });

            peer.on('error', (err) => {
                console.error('PeerJS Error:', err);
                document.getElementById('title').innerText = "Błąd sieci";
                document.getElementById('status-msg').style.display = 'block';
                document.getElementById('status-msg').innerHTML = `<span style='color:#ff4444'>Błąd PeerJS: ${err.type}</span><br>Odśwież stronę lub sprawdź konsolę (F12).`;
            });

        } catch (e) {
            console.error('Błąd inicjalizacji PeerJS:', e);
        }

        // --- Obsługa komunikacji sieciowej ---
        function setupConnectionHandlers(conn) {
            conn.on('data', (data) => {
                if (data.type === 'update') {
                    players[data.id] = data.player;
                    if (isHost) {
                        // Host synchronizuje stan wszystkich graczy do wszystkich
                        broadcast({ type: 'sync', players: players });
                    }
                }
                if (data.type === 'sync') {
                    // Klient odbiera pełny stan gry od hosta
                    players = data.players;
                }
                if (data.type === 'collision_event') {
                    // Ktoś zgłosił kolizję
                    triggerKaszanka();
                }
            });

            conn.on('close', () => {
                console.log('Połączenie zamknięte:', conn.peer);
                connections = connections.filter(c => c !== conn);
                // Usuwamy gracza, który wyszedł
                for (let id in players) {
                    if (id === conn.peer) {
                        delete players[id];
                    }
                }
                if (isHost) broadcast({ type: 'sync', players: players });
            });
        }

        // Wysyłanie danych do wszystkich połączonych peerów
        function broadcast(data) {
            connections.forEach(conn => {
                if (conn.open) conn.send(data);
            });
        }

        // --- Logika Audio (Synteza szumu) ---
        function initAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {
                console.warn("Web Audio API nie jest wspierane.");
            }
        }

        function playNoiseSound() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const bufferSize = audioCtx.sampleRate * 0.12; // Krótkie uderzenie
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // Biały szum
            }

            const noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;

            // Filtr low-pass dla efektu "uderzenia"
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(600, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

            noiseNode.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noiseNode.start();
        }

        // --- Logika Gry ---
        function startGame() {
            const name = document.getElementById('username').value.trim();
            if (!name) {
                alert('Musisz podać swoje imię!');
                return;
            }

            initAudio();
            document.getElementById('setup').style.display = 'none';

            // Tworzymy lokalnego gracza
            localPlayer = {
                id: peer.id,
                name: name,
                shape: document.getElementById('shape').value,
                x: Math.random() * (canvas.width - 200) + 100,
                y: Math.random() * (canvas.height - 200) + 100,
                vx: 0,
                vy: 0,
                size: 45 // Trochę większy, żeby lepiej trafiać
            };

            players[peer.id] = localPlayer;

            if (!isHost) {
                // Klient łączy się z hostem
                console.log('Łączenie z pokojem hosta:', roomId);
                const conn = peer.connect(roomId);
                connections.push(conn);
                setupConnectionHandlers(conn);
                
                conn.on('open', () => {
                    console.log('Połączono z hostem. Wysyłanie danych startowych.');
                    conn.send({ type: 'update', id: peer.id, player: localPlayer });
                });
            }

            // Nasłuchiwanie klawiszy (WASD i Strzałki)
            window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                keys[e.key] = true; // Dla strzałek
            });
            window.addEventListener('keyup', (e) => {
                keys[e.key.toLowerCase()] = false;
                keys[e.key] = false;
            });

            // Start pętli gry
            requestAnimationFrame(gameLoop);
        }

        // Fizyka: Inercja, Tarcie, Kolizje ze ścianami
        function updatePhysics() {
            if (!localPlayer) return;

            const acceleration = 0.6; // Przyspieszenie
            const friction = 0.93;     // Tarcie (opór)
            const maxSpeed = 10;       // Prędkość max

            // Sterowanie
            if (keys['arrowup'] || keys['w']) localPlayer.vy -= acceleration;
            if (keys['arrowdown'] || keys['s']) localPlayer.vy += acceleration;
            if (keys['arrowleft'] || keys['a']) localPlayer.vx -= acceleration;
            if (keys['arrowright'] || keys['d']) localPlayer.vx += acceleration;

            // Zastosowanie tarcia
            localPlayer.vx *= friction;
            localPlayer.vy *= friction;

            // Ograniczenie prędkości
            const speed = Math.hypot(localPlayer.vx, localPlayer.vy);
            if (speed > maxSpeed) {
                localPlayer.vx = (localPlayer.vx / speed) * maxSpeed;
                localPlayer.vy = (localPlayer.vy / speed) * maxSpeed;
            }

            // Aktualizacja pozycji
            localPlayer.x += localPlayer.vx;
            localPlayer.y += localPlayer.vy;

            // Odbicia od ścian
            const r = localPlayer.size / 2;
            if (localPlayer.x < r) { localPlayer.x = r; localPlayer.vx *= -0.6; }
            if (localPlayer.x > canvas.width - r) { localPlayer.x = canvas.width - r; localPlayer.vx *= -0.6; }
            if (localPlayer.y < r) { localPlayer.y = r; localPlayer.vy *= -0.6; }
            if (localPlayer.y > canvas.height - r) { localPlayer.y = canvas.height - r; localPlayer.vy *= -0.6; }

            // Aktualizacja stanu lokalnego w tablicy graczy
            players[peer.id] = localPlayer;

            // Wysyłanie pozycji
            if (isHost) {
                broadcast({ type: 'sync', players: players });
            } else if (connections[0] && connections[0].open) {
                connections[0].send({ type: 'update', id: peer.id, player: localPlayer });
            }

            // Sprawdzamy kolizje z innymi
            checkCollisions();
        }

        // Sprawdzanie kolizji między graczami (traktujemy wszystkich jak koła dla uproszczenia)
        function checkCollisions() {
            const pIds = Object.keys(players);
            if (pIds.length < 2) return;

            for (let i = 0; i < pIds.length; i++) {
                for (let j = i + 1; j < pIds.length; j++) {
                    const p1 = players[pIds[i]];
                    const p2 = players[pIds[j]];
                    
                    if (!p1 || !p2) continue;

                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.hypot(dx, dy);
                    const minDist = (p1.size + p2.size) / 2;

                    if (dist < minDist) {
                        // Kolizja!
                        // Tylko jeśli JA biorę udział w kolizji, to ją zgłaszam (żeby nie było dublowania)
                        if (p1.id === peer.id || p2.id === peer.id) {
                            triggerKaszanka();
                            if (isHost) {
                                broadcast({ type: 'collision_event' });
                            } else if (connections[0] && connections[0].open) {
                                connections[0].send({ type: 'collision_event' });
                            }
                        }
                        
                        // Bardzo prosta reakcja fizyczna uderzenia
                        if (p1.id === peer.id && speed > 1) {
                             localPlayer.vx *= -0.8; localPlayer.vy *= -0.8;
                        }
                    }
                }
            }
        }

        // Efekt Kaszanki
        function triggerKaszanka() {
            playNoiseSound();
            const overlay = document.getElementById('kaszanka-overlay');
            overlay.style.display = 'block';
            
            clearTimeout(kaszankaTimer);
            kaszankaTimer = setTimeout(() => {
                overlay.style.display = 'none';
            }, 900);
        }

        // Rysowanie figur
        function drawShape(ctx, shape, x, y, size) {
            ctx.beginPath();
            const r = size / 2;
            if (shape === 'circle') {
                ctx.arc(x, y, r, 0, Math.PI * 2);
            } else if (shape === 'square') {
                ctx.rect(x - r, y - r, size, size);
            } else if (shape === 'triangle') {
                for (let i = 0; i < 3; i++) {
                    const angle = (i * 2 * Math.PI / 3) - Math.PI / 2;
                    ctx.lineTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
                }
            } else if (shape === 'pentagon') {
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 2 * Math.PI / 5) - Math.PI / 2;
                    ctx.lineTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
                }
            } else if (shape === 'diamond') {
                ctx.lineTo(x, y - r);
                ctx.lineTo(x + r, y);
                ctx.lineTo(x, y + r);
                ctx.lineTo(x - r, y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }

        // Pętla renderowania
        function gameLoop() {
            // Czyszczenie ekranu
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            updatePhysics();

            // Rysowanie wszystkich graczy
            Object.values(players).forEach(p => {
                if (!p) return;
                
                // Kolory: zielony dla mnie, niebieski dla innych
                ctx.fillStyle = p.id === peer.id ? '#4CAF50' : '#2196F3';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;

                drawShape(ctx, p.shape, p.x, p.y, p.size);

                // Rysowanie imienia
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 15px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(p.name, p.x, p.y + (p.size / 2) + 22);
            });

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
