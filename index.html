<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gra Geometryczna P2P (GunDB)</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #222;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            text-align: center;
        }

        #setup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #333;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.7);
            width: 320px;
            z-index: 100;
        }

        h2 { margin-top: 0; color: #fff; }
        select, input, button {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid #555;
        }

        input { background: #fff; color: #000; }
        select { background: #fff; color: #000; }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled { background-color: #555; cursor: not-allowed; opacity: 0.7; }

        #share-link {
            display: none;
            background: #444;
            padding: 10px;
            margin-top: 15px;
            font-size: 12px;
            word-break: break-all;
            border: 1px dashed #666;
            color: #aaa;
        }

        #share-link input {
            font-size: 11px;
            padding: 5px;
            margin-top: 5px;
            background: #222;
            color: #4CAF50;
            border: 1px solid #444;
        }

        canvas {
            display: block;
            background: #111;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #kaszanka-overlay {
            display: none;
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 56px;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000;
            pointer-events: none;
            z-index: 50;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
</head>
<body>

    <div id="setup">
        <h2 id="title">Inicjalizacja węzłów...</h2>
        <div id="status-msg">Łączenie ze stabilną siatką dht...</div>
        
        <div id="setup-controls" style="display:none;">
            <input type="text" id="username" placeholder="Twoje imię" maxlength="10"><br>
            <label for="shape" style="font-size:14px; color:#ccc;">Wybierz swoją figurę:</label>
            <select id="shape">
                <option value="circle">🟢 Koło</option>
                <option value="square">🟦 Kwadrat</option>
                <option value="triangle">🔺 Trójkąt</option>
                <option value="pentagon">⬠ Pięciokąt</option>
                <option value="diamond">🔷 Romb</option>
            </select><br>
            <button id="start-btn" onclick="startGame()">Start</button>
            <div id="share-link"></div>
        </div>
    </div>

    <div id="kaszanka-overlay">MASZ KASZANKĘ?</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        let gun = null;
        let gameRoom = null;
        let roomId = null;
        let myId = 'p-' + Math.random().toString(36).substring(2, 9);

        let canvas, ctx;
        let localPlayer = null;
        let players = {};
        let keys = {};
        let audioCtx = null;
        let kaszankaTimer = null;

        // Inicjalizacja środowiska graficznego
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Identyfikacja pokoju
        const urlParams = new URLSearchParams(window.location.search);
        roomId = urlParams.get('room');
        if (!roomId) {
            roomId = 'room-' + Math.random().toString(36).substring(2, 9);
        }

        // Podłączenie do publicznych węzłów GunDB obsługujących ruch HTTPS
        try {
            gun = Gun([
                'https://gun-manhattan.herokuapp.com/gun',
                'https://gundb-relay.herokuapp.com/gun'
            ]);

            gameRoom = gun.get('geometry-game-v4').get(roomId);

            // Pokazanie kontrolek po udanej alokacji instancji bazy danych
            setTimeout(() => {
                document.getElementById('title').innerText = urlParams.get('room') ? "Dołącz do gry" : "Stwórz nową grę";
                document.getElementById('status-msg').style.display = 'none';
                document.getElementById('setup-controls').style.display = 'block';

                if (!urlParams.get('room')) {
                    const shareUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
                    const linkDiv = document.getElementById('share-link');
                    linkDiv.style.display = 'block';
                    linkDiv.innerHTML = `<strong>Wyślij link znajomym:</strong><br><input type="text" value="${shareUrl}" readonly onclick="this.select()">`;
                }
            }, 500);

        } catch (e) {
            document.getElementById('title').innerText = "Błąd sieci GunDB";
            console.error(e);
        }

        function initAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {
                console.warn(e);
            }
        }

        function playNoiseSound() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const bufferSize = audioCtx.sampleRate * 0.12;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(600, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

            noiseNode.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noiseNode.start();
        }

        function startGame() {
            const name = document.getElementById('username').value.trim();
            if (!name) {
                alert('Podaj imię!');
                return;
            }

            initAudio();
            document.getElementById('setup').style.display = 'none';

            localPlayer = {
                id: myId,
                name: name,
                shape: document.getElementById('shape').value,
                x: Math.random() * (canvas.width - 200) + 100,
                y: Math.random() * (canvas.height - 200) + 100,
                vx: 0,
                vy: 0,
                size: 45,
                lastUpdate: Date.now()
            };

            // Publikacja własnej obecności w bazie danych
            gameRoom.get(myId).put(localPlayer);

            // Nasłuchiwanie zmian od innych graczy w pokoju
            gameRoom.map().on((data, id) => {
                if (!data) return;
                // Ignoruj wpisy nieaktywne (starsze niż 7 sekund)
                if (Date.now() - data.lastUpdate > 7000) {
                    delete players[id];
                    return;
                }
                players[id] = data;
            });

            // Nasłuchiwanie globalnych zdarzeń kolizji
            gameRoom.get('_collision').on((data) => {
                if (data && Date.now() - data.time < 800) {
                    if (data.p1 === myId || data.p2 === myId) {
                        triggerKaszanka();
                    }
                }
            });

            // Usuwanie nieaktywnych graczy (co 3 sekundy)
            setInterval(() => {
                const now = Date.now();
                Object.keys(players).forEach(id => {
                    if (id !== myId && (!players[id].lastUpdate || now - players[id].lastUpdate > 6000)) {
                        delete players[id];
                    }
                });
            }, 3000);

            // Czyszczenie danych przy wyjściu ze strony
            window.addEventListener('beforeunload', () => {
                gameRoom.get(myId).put(null);
            });

            window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

            requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            if (!localPlayer) return;

            const acceleration = 0.6;
            const friction = 0.93;
            const maxSpeed = 10;

            if (keys['arrowup'] || keys['w']) localPlayer.vy -= acceleration;
            if (keys['arrowdown'] || keys['s']) localPlayer.vy += acceleration;
            if (keys['arrowleft'] || keys['a']) localPlayer.vx -= acceleration;
            if (keys['arrowright'] || keys['d']) localPlayer.vx += acceleration;

            localPlayer.vx *= friction;
            localPlayer.vy *= friction;

            const speed = Math.hypot(localPlayer.vx, localPlayer.vy);
            if (speed > maxSpeed) {
                localPlayer.vx = (localPlayer.vx / speed) * maxSpeed;
                localPlayer.vy = (localPlayer.vy / speed) * maxSpeed;
            }

            localPlayer.x += localPlayer.vx;
            localPlayer.y += localPlayer.vy;

            const r = localPlayer.size / 2;
            if (localPlayer.x < r) { localPlayer.x = r; localPlayer.vx *= -0.6; }
            if (localPlayer.x > canvas.width - r) { localPlayer.x = canvas.width - r; localPlayer.vx *= -0.6; }
            if (localPlayer.y < r) { localPlayer.y = r; localPlayer.vy *= -0.6; }
            if (localPlayer.y > canvas.height - r) { localPlayer.y = canvas.height - r; localPlayer.vy *= -0.6; }

            localPlayer.lastUpdate = Date.now();
            players[myId] = localPlayer;

            // Transmisja aktualnej pozycji do GunDB
            gameRoom.get(myId).put({
                x: localPlayer.x,
                y: localPlayer.y,
                vx: localPlayer.vx,
                vy: localPlayer.vy,
                lastUpdate: localPlayer.lastUpdate,
                name: localPlayer.name,
                shape: localPlayer.shape,
                size: localPlayer.size
            });

            checkCollisions();
        }

        function checkCollisions() {
            const pIds = Object.keys(players);
            if (pIds.length < 2) return;

            for (let i = 0; i < pIds.length; i++) {
                for (let j = i + 1; j < pIds.length; j++) {
                    const p1 = players[pIds[i]];
                    const p2 = players[pIds[j]];
                    
                    if (!p1 || !p2 || p1.id === p2.id) continue;

                    const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                    const minDist = (p1.size + p2.size) / 2;

                    if (dist < minDist) {
                        if (p1.id === myId || p2.id === myId) {
                            // Wysłanie zdarzenia kolizji do rozproszonego rejestru
                            gameRoom.get('_collision').put({
                                p1: p1.id,
                                p2: p2.id,
                                time: Date.now()
                            });
                        }
                    }
                }
            }
        }

        function triggerKaszanka() {
            playNoiseSound();
            const overlay = document.getElementById('kaszanka-overlay');
            overlay.style.display = 'block';
            
            clearTimeout(kaszankaTimer);
            kaszankaTimer = setTimeout(() => {
                overlay.style.display = 'none';
            }, 900);
        }

        function drawShape(ctx, shape, x, y, size) {
            ctx.beginPath();
            const r = size / 2;
            if (shape === 'circle') {
                ctx.arc(x, y, r, 0, Math.PI * 2);
            } else if (shape === 'square') {
                ctx.rect(x - r, y - r, size, size);
            } else if (shape === 'triangle') {
                for (let i = 0; i < 3; i++) {
                    const angle = (i * 2 * Math.PI / 3) - Math.PI / 2;
                    ctx.lineTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
                }
            } else if (shape === 'pentagon') {
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 2 * Math.PI / 5) - Math.PI / 2;
                    ctx.lineTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
                }
            } else if (shape === 'diamond') {
                ctx.lineTo(x, y - r);
                ctx.lineTo(x + r, y);
                ctx.lineTo(x, y + r);
                ctx.lineTo(x - r, y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }

        function gameLoop() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            updatePhysics();

            Object.values(players).forEach(p => {
                if (!p) return;
                
                ctx.fillStyle = p.id === myId ? '#4CAF50' : '#2196F3';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;

                drawShape(ctx, p.shape, p.x, p.y, p.size);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 15px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(p.name, p.x, p.y + (p.size / 2) + 22);
            });

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
