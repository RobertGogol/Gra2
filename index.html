<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gra - Kaszanka</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>

        canvas { display: none; }

        input, select, button { margin: 10px; padding: 10px; font-size: 16px; }
        button:disabled { background: #555; color: #aaa; }
    </style>
</head>
<body>

    <h2>Wprowadź dane</h2>

    <select id="playerShape">
        <option value="circle">Koło</option>
        <option value="square">Kwadrat</option>
        <option value="triangle">Trójkąt</option>
        <option value="pentagon">Pięciokąt</option>
        <option value="star">Gwiazda</option>
    </select><br>
    <button id="startBtn">Graj</button>
</div>

<canvas id="gameCanvas"></canvas>

    const canvas = document.getElementById('gameCanvas');
    const startBtn = document.getElementById('startBtn');

    canvas.height = window.innerHeight;

    const topic = 'kaszanka_game_room_998877';

    client.on('connect', () => {
        client.subscribe(topic);
    });

                players[data.id].lastSeen = Date.now();
            }

            name: me.name,
            shape: me.shape,
            showText: textTimer > 0
        }));
